<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashflow Intelligence — Access Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-card: rgba(15, 23, 42, 0.85);
            --bg-input: rgba(10, 14, 26, 0.6);
            --border: rgba(99, 130, 180, 0.2);
            --border-focus: #3b82f6;
            --text-primary: #e8ecf4;
            --text-muted: #7b8ca8;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.4);
            --success: #10b981;
            --error: #ef4444;
            --gradient-accent: linear-gradient(135deg, #3b82f6, #8b5cf6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background mesh */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(16, 185, 129, 0.04) 0%, transparent 50%);
            animation: meshFloat 20s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes meshFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -20px) rotate(1deg); }
            66% { transform: translate(-20px, 15px) rotate(-1deg); }
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            position: relative;
            z-index: 1;
            box-shadow: 
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px -20px var(--accent-glow);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-header {
            margin-bottom: 36px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .brand-logo {
            width: 44px;
            height: 44px;
            background: var(--gradient-accent);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .brand-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .brand-header h1 strong {
            background: var(--gradient-accent);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand-header p {
            color: var(--text-muted);
            font-size: 13px;
            margin-top: 6px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            padding: 14px 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: rgba(15, 23, 42, 0.9);
        }

        .btn {
            width: 100%;
            background: var(--gradient-accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.25s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn:hover::after { opacity: 1; }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
            box-shadow: none;
        }

        .switch-mode {
            margin-top: 28px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }

        .switch-mode a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s;
        }

        .switch-mode a:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        .msg {
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
            border-radius: 10px;
            border-left: 3px solid;
            animation: fadeInUp 0.3s ease-out;
        }

        .msg-error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border-color: var(--error);
        }

        .msg-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-color: var(--success);
        }

        #registerSection { display: none; }

        /* Subtle grid pattern */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="auth-container">
        <div class="brand-header">
            <div class="brand-logo">₫</div>
            <h1><strong>Cashflow</strong> Intelligence</h1>
            <p>Financial Control Center</p>
        </div>

        <!-- LOGIN SECTION -->
        <div id="loginSection">
            <div id="loginMsg" class="msg msg-error"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Client ID</label>
                    <input type="text" id="l_username" class="form-control" placeholder="Enter your username" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label class="form-label">Security Key</label>
                    <input type="password" id="l_password" class="form-control" placeholder="Enter your password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <div class="switch-mode">
                Don't have an account? <a onclick="toggleMode('register')">Create one</a>
            </div>
        </div>

        <!-- REGISTER SECTION -->
        <div id="registerSection">
            <div id="regMsg" class="msg msg-error"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label">Choose a Client ID</label>
                    <input type="text" id="r_username" class="form-control" placeholder="Pick a username" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Create Security Key</label>
                    <input type="password" id="r_password" class="form-control" placeholder="Create a password" required autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-secondary">Provision Account</button>
            </form>
            <div class="switch-mode">
                Already have an account? <a onclick="toggleMode('login')">Sign In</a>
            </div>
        </div>
    </div>

    <script>
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard.html';
        }

        function toggleMode(mode) {
            const login = document.getElementById('loginSection');
            const register = document.getElementById('registerSection');
            login.style.display = mode === 'login' ? 'block' : 'none';
            register.style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('loginMsg').style.display = 'none';
            document.getElementById('regMsg').style.display = 'none';
        }

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `msg msg-${type}`;
            el.style.display = 'block';
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Authenticating...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('l_username').value,
                        password: document.getElementById('l_password').value
                    })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Authentication failed');

                localStorage.setItem('token', data.token);
                localStorage.setItem('username', data.username);
                window.location.href = '/dashboard.html';
            } catch (err) {
                showMsg('loginMsg', err.message, 'error');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.textContent = 'Provisioning...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('r_username').value,
                        password: document.getElementById('r_password').value
                    })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Registration failed');

                showMsg('regMsg', '✓ Account provisioned! Redirecting to login...', 'success');
                setTimeout(() => toggleMode('login'), 1500);
            } catch (err) {
                showMsg('regMsg', err.message, 'error');
                btn.textContent = 'Provision Account';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
